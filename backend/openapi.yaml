openapi: "3.1.0"
info:
  title: Tetherpoint
  description: >
    Interface-level traceability layer for source-dependent AI meaning.
    Executable text-first pipeline: Input -> Structure -> Origin -> Selection -> Rule Units -> Governance Gate -> Verification -> Meaning -> Governance -> Output.
    Structured document_packet requests may also run the separated document-first v2 diagnostic path.
  version: "0.1.0"
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://anchored-flow-stack.onrender.com
    description: Production

paths:
  /analyze:
    post:
      operationId: analyze
      summary: Run source-dependent analysis on a source document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Pipeline result with optional document-first v2 diagnostic output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineResponse"
        "400":
          description: Invalid input, including empty content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid x-analyze-secret header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Content exceeds 500 KB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - analyzeSecret: []

  /health:
    get:
      operationId: health
      summary: Liveness check
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]

components:
  securitySchemes:
    analyzeSecret:
      type: apiKey
      in: header
      name: x-analyze-secret

  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail: { type: string }

    ContentType:
      type: string
      enum: [xml, html, json, text]

    AnalyzeOptions:
      type: object
      properties:
        run_meaning: { type: boolean, default: false }
        run_origin: { type: boolean, default: true }
        run_verification: { type: boolean, default: true }

    AnalyzeRequest:
      type: object
      required: [content, content_type]
      properties:
        content: { type: string, minLength: 1, maxLength: 500000 }
        content_type: { $ref: "#/components/schemas/ContentType" }
        options: { $ref: "#/components/schemas/AnalyzeOptions" }
        document_packet:
          oneOf:
            - $ref: "#/components/schemas/CanonicalDocumentPacket"
            - type: "null"

    SourceType:
      type: string
      enum: [text, xml, html, json, pdf, unknown]

    BlockType:
      type: string
      enum: [heading, paragraph, list_item, table, table_row, footnote, header, footer, unknown]

    SourceAnchor:
      type: object
      required: [anchor_id, source_type, document_id]
      properties:
        anchor_id: { type: string }
        source_type: { $ref: "#/components/schemas/SourceType" }
        document_id: { type: string }
        page_number: { type: ["integer", "null"] }
        block_id: { type: ["string", "null"] }
        char_start: { type: ["integer", "null"] }
        char_end: { type: ["integer", "null"] }
        bbox:
          oneOf:
            - type: array
              items: { type: number }
            - type: "null"
        source_path: { type: ["string", "null"] }

    CanonicalBlock:
      type: object
      required: [block_id, page_number, order, text, source_anchor]
      properties:
        block_id: { type: string }
        page_number: { type: integer }
        order: { type: integer }
        text: { type: string }
        source_anchor: { $ref: "#/components/schemas/SourceAnchor" }
        raw_text: { type: ["string", "null"] }
        normalized_text: { type: ["string", "null"] }
        block_type: { $ref: "#/components/schemas/BlockType" }
        extraction_warnings: { type: array, items: { type: string }, default: [] }
        metadata: { type: object, additionalProperties: true, default: {} }

    CanonicalPage:
      type: object
      required: [page_number]
      properties:
        page_number: { type: integer }
        blocks: { type: array, items: { $ref: "#/components/schemas/CanonicalBlock" }, default: [] }
        source_anchor:
          oneOf:
            - $ref: "#/components/schemas/SourceAnchor"
            - type: "null"
        raw_text: { type: ["string", "null"] }
        extraction_warnings: { type: array, items: { type: string }, default: [] }
        metadata: { type: object, additionalProperties: true, default: {} }

    CanonicalDocumentPacket:
      type: object
      required: [document_id, source_type]
      properties:
        document_id: { type: string }
        source_type: { $ref: "#/components/schemas/SourceType" }
        pages: { type: array, items: { $ref: "#/components/schemas/CanonicalPage" }, default: [] }
        title: { type: ["string", "null"] }
        source_name: { type: ["string", "null"] }
        source_uri: { type: ["string", "null"] }
        source_hash: { type: ["string", "null"] }
        extraction_profile: { type: object, additionalProperties: true, default: {} }
        extraction_warnings: { type: array, items: { type: string }, default: [] }
        metadata: { type: object, additionalProperties: true, default: {} }

    InputResult:
      type: object
      required: [raw_content, content_type, size, parse_status]
      properties:
        raw_content: { type: string }
        content_type: { type: string }
        size: { type: integer }
        parse_status: { type: string, enum: [ok, error] }
        parse_errors: { type: array, items: { type: string }, default: [] }

    StructureNode:
      type: object
      required: [node_id, section_id, role, source_anchor, source_text, normalized_text]
      properties:
        node_id: { type: string }
        section_id: { type: string }
        parent_id: { type: ["string", "null"] }
        role: { type: string, enum: [PRIMARY_RULE, EVIDENCE, CONDITION, EXCEPTION, CONSEQUENCE, DEFINITION, BOILERPLATE] }
        depth: { type: integer, default: 0 }
        source_span_start: { type: ["integer", "null"] }
        source_span_end: { type: ["integer", "null"] }
        validation_status: { type: string, enum: [valid, repaired, invalid], default: valid }
        validation_errors: { type: array, items: { type: string }, default: [] }
        source_anchor: { type: string }
        source_text: { type: string }
        normalized_text: { type: string }
        actor: { type: ["string", "null"] }
        action: { type: ["string", "null"] }
        condition: { type: ["string", "null"] }
        temporal: { type: ["string", "null"] }
        jurisdiction: { type: ["string", "null"] }
        mechanism: { type: ["string", "null"] }
        risk:
          oneOf:
            - type: object
              additionalProperties:
                type: ["string", "null"]
            - type: "null"
        tags: { type: array, items: { type: string }, default: [] }
        blocked_flags: { type: array, items: { type: string }, default: [] }
        who: { type: ["string", "null"] }
        what: { type: ["string", "null"] }
        when: { type: ["string", "null"] }
        where: { type: ["string", "null"] }
        why: { type: ["string", "null"] }
        how: { type: ["string", "null"] }

    StructureValidationIssue:
      type: object
      required: [section_id, issue_type, message]
      properties:
        section_id: { type: string }
        issue_type: { type: string, enum: [missing_primary, multiple_primary, boilerplate_leak, oversized_node, unclassified_node, unattached_child] }
        message: { type: string }
        node_id: { type: ["string", "null"] }

    StructureValidationReport:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [clean, repaired, failed] }
        issues: { type: array, items: { $ref: "#/components/schemas/StructureValidationIssue" }, default: [] }
        repaired_sections: { type: array, items: { type: string }, default: [] }

    StructureResult:
      type: object
      required: [nodes, node_count, section_count, validation_report]
      properties:
        nodes: { type: array, items: { $ref: "#/components/schemas/StructureNode" } }
        node_count: { type: integer }
        section_count: { type: integer }
        validation_report: { $ref: "#/components/schemas/StructureValidationReport" }

    SelectionResult:
      type: object
      required: [selected_nodes, excluded_nodes, selection_log]
      properties:
        selected_nodes: { type: array, items: { $ref: "#/components/schemas/StructureNode" } }
        excluded_nodes: { type: array, items: { $ref: "#/components/schemas/StructureNode" } }
        selection_log: { type: array, items: { type: string } }

    RuleUnitNodeRef:
      type: object
      required: [node_id, text, role]
      properties:
        node_id: { type: string }
        text: { type: string }
        role: { type: string }

    RuleUnitReferencedSource:
      type: object
      required: [name, referenceType, matchedText]
      properties:
        name: { type: string }
        referenceType: { type: string }
        matchedText: { type: string }
        officialSourceUrl: { type: ["string", "null"] }
        retrievalStatus: { type: string, enum: [not_attempted, manual_required, retrieved, failed], default: not_attempted }
        sourceText: { type: ["string", "null"] }
        anchors: { type: array, items: { type: string }, default: [] }
        limits: { type: array, items: { type: string }, default: [] }

    RuleUnit:
      type: object
      required: [rule_unit_id, section_id, source_text_combined, assembly_status, meaning_eligible, verification_eligible, review_status]
      properties:
        rule_unit_id: { type: string }
        section_id: { type: string }
        primary_node_id: { type: ["string", "null"] }
        primary_text: { type: ["string", "null"] }
        conditions: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        exceptions: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        evidence_requirements: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        consequences: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        definitions: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        timing: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        jurisdiction: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        mechanisms: { type: array, items: { $ref: "#/components/schemas/RuleUnitNodeRef" }, default: [] }
        external_references: { type: array, items: { type: string }, default: [] }
        requires_reference_resolution: { type: boolean, default: false }
        referenced_sources: { type: array, items: { $ref: "#/components/schemas/RuleUnitReferencedSource" }, default: [] }
        source_node_ids: { type: array, items: { type: string }, default: [] }
        fragment_node_ids: { type: array, items: { type: string }, default: [] }
        source_text_combined: { type: string }
        assembly_status: { type: string, enum: [complete, needs_review, blocked] }
        assembly_issues: { type: array, items: { type: string }, default: [] }
        meaning_eligible: { type: boolean }
        verification_eligible: { type: boolean }
        review_status: { type: string, enum: [ready, needs_review, blocked] }

    RuleUnitResult:
      type: object
      required: [rule_units, unit_count, ready_count, needs_review_count]
      properties:
        rule_units: { type: array, items: { $ref: "#/components/schemas/RuleUnit" } }
        unit_count: { type: integer }
        ready_count: { type: integer }
        needs_review_count: { type: integer }
        assembly_log: { type: array, items: { type: string }, default: [] }

    MeaningBrief:
      type: object
      properties:
        rule_unit_ids: { type: array, items: { type: string }, default: [] }
        source_node_ids: { type: array, items: { type: string }, default: [] }
        key_terms: { type: array, items: { type: string }, default: [] }
        obligations: { type: array, items: { type: string }, default: [] }
        conditions: { type: array, items: { type: string }, default: [] }
        exceptions: { type: array, items: { type: string }, default: [] }
        referenced_acts: { type: array, items: { type: string }, default: [] }
        external_reference_needed: { type: boolean, default: false }
        truncated: { type: boolean, default: false }

    MeaningNodeResult:
      type: object
      required: [node_id, source_text]
      properties:
        node_id: { type: string }
        source_text: { type: string }
        status: { type: ["string", "null"] }
        error: { type: ["string", "null"] }
        message: { type: ["string", "null"] }
        raw_response: { type: ["string", "null"] }
        plain_meaning: { type: ["string", "null"] }
        missing_information: { type: array, items: { type: string }, default: [] }

    MeaningResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [executed, fallback, skipped, error] }
        message: { type: ["string", "null"] }
        node_results: { type: array, items: { $ref: "#/components/schemas/MeaningNodeResult" }, default: [] }
        overall_plain_meaning: { type: ["string", "null"] }
        summary_basis: { type: ["string", "null"] }
        summary_brief:
          oneOf:
            - $ref: "#/components/schemas/MeaningBrief"
            - type: "null"
        summary_missing_information: { type: array, items: { type: string }, default: [] }

    OriginSignal:
      type: object
      required: [signal, value]
      properties:
        signal: { type: string }
        value: { type: string }
        category: { type: ["string", "null"] }

    ReferencedSource:
      type: object
      required: [reference_id, name, reference_type, matched_text]
      properties:
        reference_id: { type: string }
        name: { type: string }
        reference_type: { type: string }
        matched_text: { type: string }
        source_system: { type: ["string", "null"] }
        official_source_url: { type: ["string", "null"] }
        why_it_matters: { type: ["string", "null"] }
        status: { type: string, default: official_reference_detected }

    OriginResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [executed, skipped] }
        origin_identity_signals: { type: array, items: { $ref: "#/components/schemas/OriginSignal" }, default: [] }
        origin_metadata_signals: { type: array, items: { $ref: "#/components/schemas/OriginSignal" }, default: [] }
        distribution_signals: { type: array, items: { $ref: "#/components/schemas/OriginSignal" }, default: [] }
        referenced_sources: { type: array, items: { $ref: "#/components/schemas/ReferencedSource" }, default: [] }
        evidence_trace: { type: array, items: { type: string }, default: [] }

    VerificationNodeResult:
      type: object
      required: [node_id, assertion_detected, verification_path_available]
      properties:
        node_id: { type: string }
        rule_unit_id: { type: ["string", "null"] }
        source_node_ids: { type: array, items: { type: string }, default: [] }
        assertion_detected: { type: boolean }
        assertion_type:
          oneOf:
            - type: string
              enum: [legal_legislative, court_case_law, government_publication, scholarly_citation, publication_disclosure, research_methodology, conceptual_theory, academic_research_literature, scientific_biomedical, statistical_public_data, corporate_financial, infrastructure_energy, historical_archival]
            - type: "null"
        verification_path_available: { type: boolean }
        expected_record_systems: { type: array, items: { type: string }, default: [] }
        verification_notes: { type: ["string", "null"] }

    VerificationResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [executed, skipped] }
        node_results: { type: array, items: { $ref: "#/components/schemas/VerificationNodeResult" }, default: [] }

    GovernanceReferenceRole:
      type: object
      required: [source, role]
      properties:
        source: { type: string }
        role: { type: string }
        reason: { type: ["string", "null"] }

    GovernanceGateResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [match, needs_review] }
        scope_lanes: { type: array, items: { type: string }, default: [] }
        actor_scopes: { type: array, items: { type: string }, default: [] }
        process_scopes: { type: array, items: { type: string }, default: [] }
        evidence_categories: { type: array, items: { type: string }, default: [] }
        reference_roles: { type: array, items: { $ref: "#/components/schemas/GovernanceReferenceRole" }, default: [] }
        non_blending_rules: { type: array, items: { type: string }, default: [] }
        practical_questions: { type: array, items: { type: string }, default: [] }
        limits: { type: array, items: { type: string }, default: [] }

    GovernanceStatus:
      type: string
      enum: [match, mismatch_detected, contradiction_detected, missing_required_source, needs_review, unsupported_downstream_action]

    GovernanceRecord:
      type: object
      required: [fieldName]
      properties:
        fieldName: { type: string }
        extractedValue: { type: ["string", "null"] }
        sourceAnchor: { type: ["string", "null"] }
        sourceSystem: { type: ["string", "null"] }
        documentType: { type: ["string", "null"] }

    GovernanceCheckResult:
      type: object
      required: [checkName, status]
      properties:
        checkName: { type: string }
        status: { $ref: "#/components/schemas/GovernanceStatus" }
        issue: { type: ["string", "null"] }
        missingFields: { type: array, items: { type: string }, default: [] }
        comparedField: { type: ["string", "null"] }
        firstValue: { type: ["string", "null"] }
        secondValue: { type: ["string", "null"] }
        requestedAction: { type: ["string", "null"] }
        blockingStatus:
          oneOf:
            - $ref: "#/components/schemas/GovernanceStatus"
            - type: "null"

    GovernanceRecordResult:
      type: object
      required: [overallStatus, checks, activeIssues, principle]
      properties:
        inputField: { type: ["string", "null"] }
        extractedValue: { type: ["string", "null"] }
        sourceAnchor: { type: ["string", "null"] }
        sourceSystem: { type: ["string", "null"] }
        documentType: { type: ["string", "null"] }
        overallStatus: { $ref: "#/components/schemas/GovernanceStatus" }
        checks: { type: array, items: { $ref: "#/components/schemas/GovernanceCheckResult" }, default: [] }
        activeIssues: { type: array, items: { $ref: "#/components/schemas/GovernanceCheckResult" }, default: [] }
        principle: { type: string }

    GovernanceResult:
      type: object
      required: [status, record_count, issue_count, results, activeIssues, principle]
      properties:
        status: { $ref: "#/components/schemas/GovernanceStatus" }
        record_count: { type: integer }
        issue_count: { type: integer }
        results: { type: array, items: { $ref: "#/components/schemas/GovernanceRecordResult" }, default: [] }
        activeIssues: { type: array, items: { $ref: "#/components/schemas/GovernanceCheckResult" }, default: [] }
        principle: { type: string }

    OutputResult:
      type: object
      required: [summary, total_nodes, selected_count, excluded_count, meaning_status, origin_status, verification_status]
      properties:
        summary: { type: object, additionalProperties: true }
        total_nodes: { type: integer }
        selected_count: { type: integer }
        excluded_count: { type: integer }
        rule_unit_count: { type: integer, default: 0 }
        ready_rule_unit_count: { type: integer, default: 0 }
        needs_review_rule_unit_count: { type: integer, default: 0 }
        meaning_status: { type: string }
        origin_status: { type: string }
        verification_status: { type: string }
        governance_status: { type: string, default: match }
        governance_issue_count: { type: integer, default: 0 }

    SourceMetadataContract:
      type: object
      required: [source_id, source_name]
      properties:
        source_id: { type: string }
        source_name: { type: string }
        source_role: { type: string, enum: [authoritative_record, derivative_record, reference_record, temporal_record, contextual_record, unknown], default: unknown }
        source_system: { type: ["string", "null"] }
        source_url: { type: ["string", "null"] }
        adapter: { type: ["string", "null"] }
        matched_text: { type: ["string", "null"] }
        source_text: { type: ["string", "null"] }
        resolution_state:
          type: string
          enum: [not_attempted, found, partial, multiple_candidates, not_found, manual_required, failed, passage_not_found, version_unresolved, reference_chain_open, contextual_fact_missing, conflict_unresolved, threshold_not_met, scope_exceeded]
          default: not_attempted
        version_or_time_window: { type: ["string", "null"] }
        dependencies_open: { type: array, items: { type: string }, default: [] }
        anchors_available: { type: array, items: { type: string }, default: [] }
        anchors_missing: { type: array, items: { type: string }, default: [] }
        anchors_conflict: { type: array, items: { type: string }, default: [] }
        review_state: { type: string, enum: [ready, needs_review, blocked], default: ready }
        related_rule_unit_ids: { type: array, items: { type: string }, default: [] }
        related_node_ids: { type: array, items: { type: string }, default: [] }
        limits: { type: array, items: { type: string }, default: [] }

    HumanReviewHandoff:
      type: object
      required: [handoff_id, handoff_type, severity, reason, human_question]
      properties:
        handoff_id: { type: string }
        handoff_type: { type: string, enum: [threshold_not_met, conflict_requiring_judgment, inference_chain_too_long, version_or_temporal_ambiguity, contextual_fact_required, scope_exceeded] }
        severity: { type: string, enum: [alert, blocked, degraded, review_required] }
        status: { type: string, enum: [active], default: active }
        affected_output_ids: { type: array, items: { type: string }, default: [] }
        source_objects: { type: array, items: { type: string }, default: [] }
        dependencies: { type: array, items: { type: string }, default: [] }
        anchors_present: { type: array, items: { type: string }, default: [] }
        anchors_missing: { type: array, items: { type: string }, default: [] }
        reason: { type: string }
        human_question: { type: string }
        can_proceed: { type: boolean, default: false }

    DocumentStructureNode:
      type: object
      properties:
        document_id: { type: string }
        structural_node_id: { type: string }
        parent_id: { type: ["string", "null"] }
        page_number: { type: ["integer", "null"] }
        block_id: { type: ["string", "null"] }
        block_type:
          oneOf:
            - $ref: "#/components/schemas/BlockType"
            - type: "null"
        structural_type: { type: string, enum: [document, page, heading, paragraph, list_item, table, table_row, footnote, header, footer, unknown] }
        order: { type: integer }
        depth: { type: integer }
        source_text: { type: string }
        normalized_text: { type: string }
        source_anchor:
          oneOf:
            - $ref: "#/components/schemas/SourceAnchor"
            - type: "null"

    DocumentStructureResult:
      type: object
      properties:
        document_id: { type: string }
        nodes: { type: array, items: { $ref: "#/components/schemas/DocumentStructureNode" } }

    SemanticStructureSignal:
      type: object
      properties:
        signal_id: { type: string }
        document_id: { type: string }
        structural_node_id: { type: string }
        signal_type: { type: string }
        anchor_text: { type: string }
        source_anchor:
          oneOf:
            - $ref: "#/components/schemas/SourceAnchor"
            - type: "null"
        detection_basis: { type: string, enum: [explicit_text, structural_pattern] }
        actor: { type: ["string", "null"] }
        action: { type: ["string", "null"] }
        condition: { type: ["string", "null"] }
        temporal: { type: ["string", "null"] }
        target: { type: ["string", "null"] }
        confidence: { type: number, default: 1.0 }

    SemanticStructureResult:
      type: object
      properties:
        document_id: { type: string }
        signals: { type: array, items: { $ref: "#/components/schemas/SemanticStructureSignal" }, default: [] }
        signal_count: { type: integer, default: 0 }

    SelectedSemanticSignal:
      type: object
      properties:
        signal_id: { type: string }
        document_id: { type: string }
        structural_node_id: { type: string }
        signal_type: { type: string }
        anchor_text: { type: string }
        source_anchor: { $ref: "#/components/schemas/SourceAnchor" }
        eligibility_reason: { type: string }

    ExcludedSemanticSignal:
      type: object
      properties:
        signal_id: { type: string }
        document_id: { type: string }
        structural_node_id: { type: string }
        signal_type: { type: string }
        anchor_text: { type: string }
        source_anchor:
          oneOf:
            - $ref: "#/components/schemas/SourceAnchor"
            - type: "null"
        exclusion_reason: { type: string }

    SelectionV2Result:
      type: object
      properties:
        document_id: { type: string }
        selected_signals: { type: array, items: { $ref: "#/components/schemas/SelectedSemanticSignal" }, default: [] }
        excluded_signals: { type: array, items: { $ref: "#/components/schemas/ExcludedSemanticSignal" }, default: [] }
        selection_log: { type: array, items: { type: string }, default: [] }
        selected_count: { type: integer, default: 0 }
        excluded_count: { type: integer, default: 0 }

    RuleUnitV2Candidate:
      type: object
      properties:
        candidate_id: { type: string }
        document_id: { type: string }
        structural_node_id: { type: string }
        source_anchor:
          oneOf:
            - $ref: "#/components/schemas/SourceAnchor"
            - type: "null"
        source_text: { type: string }
        selected_signal_ids: { type: array, items: { type: string }, default: [] }
        signal_types: { type: array, items: { type: string }, default: [] }
        anchor_texts: { type: array, items: { type: string }, default: [] }
        assembly_status: { type: string, enum: [ready, needs_review, blocked] }
        assembly_notes: { type: array, items: { type: string }, default: [] }

    RuleUnitV2CandidateResult:
      type: object
      properties:
        document_id: { type: string }
        candidates: { type: array, items: { $ref: "#/components/schemas/RuleUnitV2Candidate" }, default: [] }
        candidate_count: { type: integer, default: 0 }
        assembly_log: { type: array, items: { type: string }, default: [] }

    DocumentFirstV2Result:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [executed, skipped, error] }
        document_structure:
          oneOf:
            - $ref: "#/components/schemas/DocumentStructureResult"
            - type: "null"
        semantic_structure:
          oneOf:
            - $ref: "#/components/schemas/SemanticStructureResult"
            - type: "null"
        selection_v2:
          oneOf:
            - $ref: "#/components/schemas/SelectionV2Result"
            - type: "null"
        rule_unit_candidates:
          oneOf:
            - $ref: "#/components/schemas/RuleUnitV2CandidateResult"
            - type: "null"
        error: { type: ["string", "null"] }

    PipelineError:
      type: object
      required: [layer, error, fatal]
      properties:
        layer: { type: string, enum: [input, structure, origin, selection, rule_units, governance_gate, verification, meaning, governance, output] }
        error: { type: string }
        fatal: { type: boolean, default: false }

    PipelineResponse:
      type: object
      required: [input, structure, selection, rule_units, governance_gate, meaning, origin, verification, governance, output]
      properties:
        input: { $ref: "#/components/schemas/InputResult" }
        structure: { $ref: "#/components/schemas/StructureResult" }
        selection: { $ref: "#/components/schemas/SelectionResult" }
        rule_units: { $ref: "#/components/schemas/RuleUnitResult" }
        governance_gate: { $ref: "#/components/schemas/GovernanceGateResult" }
        meaning: { $ref: "#/components/schemas/MeaningResult" }
        origin: { $ref: "#/components/schemas/OriginResult" }
        verification: { $ref: "#/components/schemas/VerificationResult" }
        governance: { $ref: "#/components/schemas/GovernanceResult" }
        output: { $ref: "#/components/schemas/OutputResult" }
        errors: { type: array, items: { $ref: "#/components/schemas/PipelineError" }, default: [] }
        source_metadata: { type: array, items: { $ref: "#/components/schemas/SourceMetadataContract" }, default: [] }
        human_review_handoffs: { type: array, items: { $ref: "#/components/schemas/HumanReviewHandoff" }, default: [] }
        document_first_v2: { $ref: "#/components/schemas/DocumentFirstV2Result" }

    ValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
