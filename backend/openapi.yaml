openapi: "3.1.0"
info:
  title: Tetherpoint
  description: >
    Source-anchored parsing stack. Current executable 7-layer pipeline:
    Input -> Structure -> Origin -> Selection -> Verification -> Meaning -> Output.
    Verification routes assertions to candidate record systems; it does not decide truth.
  version: "0.1.0"
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://anchored-flow-stack.onrender.com
    description: Production

paths:
  /analyze:
    post:
      operationId: analyze
      summary: Run the source-anchored 7-layer pipeline on a source document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Full pipeline result with all layer outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineResponse"
        "400":
          description: Invalid input, including empty content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid x-analyze-secret header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Content exceeds 500 KB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - analyzeSecret: []

  /health:
    get:
      operationId: health
      summary: Liveness check
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]

components:
  securitySchemes:
    analyzeSecret:
      type: apiKey
      in: header
      name: x-analyze-secret
      description: Shared secret for server-to-backend authentication.

  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string

    ContentType:
      type: string
      enum: [xml, html, json, text]

    AnalyzeOptions:
      type: object
      properties:
        run_meaning:
          type: boolean
          default: false
          description: Optional AI Meaning layer execution.
        run_origin:
          type: boolean
          default: true
        run_verification:
          type: boolean
          default: true

    AnalyzeRequest:
      type: object
      required: [content, content_type]
      properties:
        content:
          type: string
          description: Raw document text
          minLength: 1
          maxLength: 500000
        content_type:
          $ref: "#/components/schemas/ContentType"
        options:
          $ref: "#/components/schemas/AnalyzeOptions"

    InputResult:
      type: object
      required: [raw_content, content_type, size, parse_status]
      properties:
        raw_content:
          type: string
        content_type:
          type: string
        size:
          type: integer
        parse_status:
          type: string
          enum: [ok, error]
        parse_errors:
          type: array
          items:
            type: string
          default: []

    StructureNode:
      type: object
      required:
        - node_id
        - section_id
        - role
        - depth
        - validation_status
        - validation_errors
        - source_anchor
        - source_text
        - normalized_text
        - tags
        - blocked_flags
      properties:
        node_id:
          type: string
        section_id:
          type: string
        parent_id:
          type: ["string", "null"]
        role:
          type: string
          enum: [PRIMARY_RULE, EVIDENCE, CONDITION, EXCEPTION, CONSEQUENCE, DEFINITION, BOILERPLATE]
        depth:
          type: integer
        source_span_start:
          type: ["integer", "null"]
        source_span_end:
          type: ["integer", "null"]
        validation_status:
          type: string
          enum: [valid, repaired, invalid]
        validation_errors:
          type: array
          items:
            type: string
          default: []
        source_anchor:
          type: string
        source_text:
          type: string
        normalized_text:
          type: string
        actor:
          type: ["string", "null"]
        action:
          type: ["string", "null"]
        condition:
          type: ["string", "null"]
        temporal:
          type: ["string", "null"]
        jurisdiction:
          type: ["string", "null"]
        mechanism:
          type: ["string", "null"]
        risk:
          oneOf:
            - type: object
              properties:
                likelihood:
                  type: ["string", "null"]
                impact:
                  type: ["string", "null"]
            - type: "null"
        tags:
          type: array
          items:
            type: string
        blocked_flags:
          type: array
          items:
            type: string
        who:
          type: ["string", "null"]
        what:
          type: ["string", "null"]
        when:
          type: ["string", "null"]
        where:
          type: ["string", "null"]
        why:
          type: ["string", "null"]
        how:
          type: ["string", "null"]

    StructureResult:
      type: object
      required: [nodes, node_count, section_count, validation_report]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/StructureNode"
        node_count:
          type: integer
        section_count:
          type: integer
        validation_report:
          $ref: "#/components/schemas/StructureValidationReport"

    StructureValidationIssue:
      type: object
      required: [section_id, issue_type, message]
      properties:
        section_id:
          type: string
        issue_type:
          type: string
          enum: [missing_primary, multiple_primary, boilerplate_leak, oversized_node, unclassified_node, unattached_child]
        message:
          type: string
        node_id:
          type: ["string", "null"]

    StructureValidationReport:
      type: object
      required: [status, issues, repaired_sections]
      properties:
        status:
          type: string
          enum: [clean, repaired, failed]
        issues:
          type: array
          items:
            $ref: "#/components/schemas/StructureValidationIssue"
          default: []
        repaired_sections:
          type: array
          items:
            type: string
          default: []

    SelectionResult:
      type: object
      required: [selected_nodes, excluded_nodes, selection_log]
      properties:
        selected_nodes:
          type: array
          items:
            $ref: "#/components/schemas/StructureNode"
        excluded_nodes:
          type: array
          items:
            $ref: "#/components/schemas/StructureNode"
        selection_log:
          type: array
          items:
            type: string

    MeaningLens:
      type: object
      required: [lens, detected]
      properties:
        lens:
          type: string
          enum: [modality_shift, scope_change, actor_power_shift, action_domain_shift, threshold_standard_shift, obligation_removal]
        detected:
          type: boolean
        detail:
          type: ["string", "null"]

    MeaningScopeDetail:
      type: object
      required: [scope]
      properties:
        scope:
          type: string
          enum: [modality_shift, scope_change, actor_power_shift, action_domain_shift, threshold_standard_shift, obligation_removal]
        detail:
          type: ["string", "null"]
        evidence:
          type: ["string", "null"]

    MeaningNodeResult:
      type: object
      required: [node_id, source_text, lenses]
      properties:
        node_id:
          type: string
        source_text:
          type: string
        status:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        raw_response:
          type: ["string", "null"]
        lenses:
          type: array
          items:
            $ref: "#/components/schemas/MeaningLens"
        detected_scopes:
          type: array
          items:
            type: string
          default: []
        plain_meaning:
          type: ["string", "null"]
        scope_details:
          type: array
          items:
            $ref: "#/components/schemas/MeaningScopeDetail"
          default: []
        missing_information:
          type: array
          items:
            type: string
          default: []

    MeaningResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [executed, skipped, error]
        message:
          type: ["string", "null"]
        node_results:
          type: array
          items:
            $ref: "#/components/schemas/MeaningNodeResult"
          default: []

    OriginSignal:
      type: object
      required: [signal, value]
      properties:
        signal:
          type: string
        value:
          type: string
        category:
          type: ["string", "null"]

    OriginResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [executed, skipped]
        origin_identity_signals:
          type: array
          items:
            $ref: "#/components/schemas/OriginSignal"
          default: []
        origin_metadata_signals:
          type: array
          items:
            $ref: "#/components/schemas/OriginSignal"
          default: []
        distribution_signals:
          type: array
          items:
            $ref: "#/components/schemas/OriginSignal"
          default: []
        evidence_trace:
          type: array
          items:
            type: string
          default: []

    VerificationNodeResult:
      type: object
      required: [node_id, assertion_detected, verification_path_available]
      properties:
        node_id:
          type: string
        assertion_detected:
          type: boolean
        assertion_type:
          oneOf:
            - type: string
              enum: [legal_legislative, court_case_law, government_publication, scientific_biomedical, statistical_public_data, corporate_financial, infrastructure_energy, historical_archival]
            - type: "null"
        verification_path_available:
          type: boolean
        expected_record_systems:
          type: array
          items:
            type: string
          default: []
        verification_notes:
          type: ["string", "null"]

    VerificationResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [executed, skipped]
        node_results:
          type: array
          items:
            $ref: "#/components/schemas/VerificationNodeResult"
          default: []

    OutputResult:
      type: object
      required: [summary, total_nodes, selected_count, excluded_count, meaning_status, origin_status, verification_status]
      properties:
        summary:
          type: object
          additionalProperties: true
        total_nodes:
          type: integer
        selected_count:
          type: integer
        excluded_count:
          type: integer
        meaning_status:
          type: string
        origin_status:
          type: string
        verification_status:
          type: string

    PipelineError:
      type: object
      required: [layer, error, fatal]
      properties:
        layer:
          type: string
          enum: [input, structure, selection, meaning, origin, verification, output]
        error:
          type: string
        fatal:
          type: boolean
          default: false

    PipelineResponse:
      type: object
      required: [input, structure, selection, meaning, origin, verification, output]
      properties:
        input:
          $ref: "#/components/schemas/InputResult"
        structure:
          $ref: "#/components/schemas/StructureResult"
        selection:
          $ref: "#/components/schemas/SelectionResult"
        meaning:
          $ref: "#/components/schemas/MeaningResult"
        origin:
          $ref: "#/components/schemas/OriginResult"
        verification:
          $ref: "#/components/schemas/VerificationResult"
        output:
          $ref: "#/components/schemas/OutputResult"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/PipelineError"
          default: []

    ValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
              msg:
                type: string
              type:
                type: string
